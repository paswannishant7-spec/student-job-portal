{% extends "base.html" %}
{% block title %}Add Job – Admin{% endblock %}

{% block content %}
<div class="container page-wrapper" style="max-width:680px;">
  <a href="{{ url_for('admin_jobs') }}" style="display:inline-flex; align-items:center; gap:.4rem; color:#64748b; font-size:.9rem; margin-bottom:1.5rem;">
    ← Back to Jobs
  </a>

  <div class="card">
    <div class="card-header"><h2>➕ Post a New Job</h2></div>
    <div class="card-body">
      <form method="POST" action="{{ url_for('add_job') }}">
        <div class="form-group">
          <label class="form-label" for="title">Job Title *</label>
          <input class="form-control" type="text" id="title" name="title"
                 placeholder="e.g. Computer Operator" required maxlength="150"
                 value="{{ request.form.get('title','') }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="company">Company Name *</label>
          <input class="form-control" type="text" id="company" name="company"
                 placeholder="e.g. TechSoft Pvt. Ltd." required maxlength="150"
                 value="{{ request.form.get('company','') }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="location">Location *</label>
          <input class="form-control" type="text" id="location" name="location"
                 placeholder="e.g. Delhi, Noida, Faridabad" required maxlength="100"
                 value="{{ request.form.get('location','') }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="salary">Salary (Optional)</label>
          <input class="form-control" type="text" id="salary" name="salary"
                 placeholder="e.g. ₹15,000 – ₹20,000/month" maxlength="100"
                 value="{{ request.form.get('salary','') }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="description">Job Description *</label>
          <textarea class="form-control" id="description" name="description"
                    placeholder="Write the full job description, required skills, and qualifications..."
                    required rows="6">{{ request.form.get('description','') }}</textarea>
        </div>
        <div style="display:flex; gap:.75rem; flex-wrap:wrap;">
          <button type="submit" class="btn btn-primary btn-lg">Post Job</button>
          <a href="{{ url_for('admin_jobs') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
