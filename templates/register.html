{% extends "base.html" %}
{% block title %}Register – Student Job Portal{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo"><span>🎓</span></div>
    <h2>Create Account</h2>
    <p class="subtitle">Start your job search journey today</p>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input class="form-control" type="text" id="name" name="name"
               placeholder="Rahul Sharma" required maxlength="100"
               value="{{ request.form.get('name','') }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-control" type="email" id="email" name="email"
               placeholder="rahul@example.com" required maxlength="150"
               value="{{ request.form.get('email','') }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="Minimum 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input class="form-control" type="password" id="confirm_password"
               name="confirm_password" placeholder="Re-enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in here</a>
    </div>
  </div>
</div>
{% endblock %}
