{% extends "base.html" %}
{% block title %}Login – Student Job Portal{% endblock %}

{% block content %}

<div class="auth-container">

  <div class="auth-card">

    <div class="auth-icon">🔐</div>

    <h2>Welcome Back</h2>
    <p class="subtext">Sign in to continue your journey</p>

    <form method="POST" action="{{ url_for('login') }}">

      <div class="form-group">
        <label>Email Address</label>
        <input type="email"
               name="email"
               placeholder="Enter your email"
               value="{{ request.form.get('email','') }}"
               required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password"
               name="password"
               placeholder="Enter your password"
               required>
      </div>

      <button type="submit" class="btn-primary full-btn">Sign In</button>

    </form>

    <div class="admin-box">
      <p><strong>Admin Login</strong></p>
      <p>Email: admin@portal.com</p>
      <p>Password: Admin@123</p>
    </div>

    <p class="auth-link">
      New here? <a href="{{ url_for('register') }}">Create account</a>
    </p>

  </div>

</div>

{% endblock %}
